<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Events')}"></head>
<body class="bg-slate-950 text-white min-h-screen">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold text-white">Events</h1>
            <p class="text-slate-400 mt-1">Browse and filter all sport events</p>
        </div>
        <a href="/events/new"
           class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold rounded-lg transition-colors">
            + New Event
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}"
         class="mb-4 flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl px-4 py-3 text-sm">
        <span>✓</span><span th:text="${successMessage}">Success</span>
    </div>
    <div th:if="${errorMessage}"
         class="mb-4 flex items-center gap-2 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl px-4 py-3 text-sm">
        <span>⚠</span><span th:text="${errorMessage}">Error</span>
    </div>

    <!-- Filters -->
    <form method="get" action="/events" class="bg-slate-800/50 border border-slate-700/40 rounded-xl p-4 mb-6 flex flex-wrap gap-3 items-end">
        <div class="flex flex-col gap-1">
            <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Sport</label>
            <select name="sportId" class="bg-slate-900 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                <option value="">All Sports</option>
                <option th:each="sport : ${sports}"
                        th:value="${sport.id}"
                        th:text="${sport.name}"
                        th:selected="${sport.id == selectedSportId}">Sport</option>
            </select>
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Status</label>
            <select name="status" class="bg-slate-900 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                <option value="">All Statuses</option>
                <option th:each="s : ${statuses}"
                        th:value="${s.name()}"
                        th:text="${s.name()}"
                        th:selected="${s == selectedStatus}">Status</option>
            </select>
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">From</label>
            <input type="date" name="from"
                   th:value="${selectedFrom}"
                   class="bg-slate-900 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none"/>
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">To</label>
            <input type="date" name="to"
                   th:value="${selectedTo}"
                   class="bg-slate-900 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none"/>
        </div>
        <button type="submit"
                class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-lg transition-colors">
            Filter
        </button>
        <a href="/events" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-medium rounded-lg transition-colors">
            Reset
        </a>
    </form>

    <!-- Count -->
    <p class="text-slate-500 text-sm mb-4">
        Showing <span class="text-white font-medium" th:text="${events.size()}">0</span> events
    </p>

    <!-- No results -->
    <div th:if="${events.isEmpty()}" class="text-center py-20 text-slate-500">
        <p class="text-xl">No events match your filters.</p>
        <a href="/events" class="mt-3 inline-block text-indigo-400 hover:underline text-sm">Clear filters</a>
    </div>

    <!-- Events Table -->
    <div th:if="${!events.isEmpty()}" class="overflow-hidden rounded-xl border border-slate-700/50">
        <table class="w-full text-sm">
            <thead>
            <tr class="bg-slate-800/80 text-slate-400 text-xs uppercase tracking-wider">
                <th class="text-left px-4 py-3 font-medium">Match</th>
                <th class="text-left px-4 py-3 font-medium">Sport</th>
                <th class="text-center px-4 py-3 font-medium">Score</th>
                <th class="text-left px-4 py-3 font-medium">Date & Time</th>
                <th class="text-left px-4 py-3 font-medium">Venue</th>
                <th class="text-center px-4 py-3 font-medium">Status</th>
                <th class="px-4 py-3"></th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-700/40">
            <tr th:each="event : ${events}"
                class="bg-slate-900/50 hover:bg-slate-800/60 transition-colors">
                <!-- Match -->
                <td class="px-4 py-3">
                    <div th:with="homeTeams=${event.teams.?[home == true]}, awayTeams=${event.teams.?[home == false]}">
                        <p class="font-semibold text-white">
                            <span th:text="${homeTeams.isEmpty() ? 'TBD' : homeTeams[0].teamName}">Home</span>
                            <span class="text-slate-500 mx-1">vs</span>
                            <span th:text="${awayTeams.isEmpty() ? 'TBD' : awayTeams[0].teamName}">Away</span>
                        </p>
                    </div>
                </td>
                <!-- Sport -->
                <td class="px-4 py-3">
                    <span class="text-xs font-semibold text-indigo-400 bg-indigo-500/10 border border-indigo-500/20 px-2 py-0.5 rounded-full"
                          th:text="${event.sportName}">Sport</span>
                </td>
                <!-- Score -->
                <td class="px-4 py-3 text-center">
                    <div th:with="homeTeams=${event.teams.?[home == true]}, awayTeams=${event.teams.?[home == false]}">
                        <span class="font-bold text-white"
                              th:text="${homeTeams.isEmpty() ? '-' : (homeTeams[0].score != null ? homeTeams[0].score : '-')}">-</span>
                        <span class="text-slate-600 mx-1">:</span>
                        <span class="font-bold text-white"
                              th:text="${awayTeams.isEmpty() ? '-' : (awayTeams[0].score != null ? awayTeams[0].score : '-')}">-</span>
                    </div>
                </td>
                <!-- Date -->
                <td class="px-4 py-3 text-slate-400">
                    <p th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy')}">Date</p>
                    <p class="text-xs text-slate-500" th:text="${#temporals.format(event.eventTime, 'HH:mm')}">Time</p>
                </td>
                <!-- Venue -->
                <td class="px-4 py-3 text-slate-400 text-xs" th:text="${event.venueName}">Venue</td>
                <!-- Status -->
                <td class="px-4 py-3 text-center">
                    <span th:if="${event.status.name() == 'LIVE'}"
                          class="flex items-center justify-center gap-1.5 text-xs font-bold text-red-400 bg-red-500/10 border border-red-500/20 px-2.5 py-1 rounded-full w-fit mx-auto">
                        <span class="w-1.5 h-1.5 bg-red-400 rounded-full live-pulse"></span>LIVE
                    </span>
                    <span th:if="${event.status.name() == 'SCHEDULED'}"
                          class="text-xs font-semibold text-blue-400 bg-blue-500/10 border border-blue-500/20 px-2.5 py-1 rounded-full">
                        SCHEDULED
                    </span>
                    <span th:if="${event.status.name() == 'FINISHED'}"
                          class="text-xs font-semibold text-slate-400 bg-slate-700/40 border border-slate-600/30 px-2.5 py-1 rounded-full">
                        FINISHED
                    </span>
                </td>
                <!-- Link -->
                <td class="px-4 py-3 text-right">
                    <a th:href="@{/events/{id}(id=${event.id})}"
                       class="text-xs text-indigo-400 hover:text-indigo-300 font-medium">Details →</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
