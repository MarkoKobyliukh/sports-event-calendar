<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('New Event')}"></head>
<body class="bg-slate-950 text-white min-h-screen">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <a href="/events" class="inline-flex items-center gap-1 text-slate-400 hover:text-white text-sm mb-6 transition-colors">
        ← Back to Events
    </a>

    <div class="mb-6">
        <h1 class="text-3xl font-bold text-white">New Event</h1>
        <p class="text-slate-400 mt-1">Add a new sport event to the calendar</p>
    </div>

    <!-- Error message -->
    <div th:if="${errorMessage}"
         class="mb-6 flex items-center gap-3 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl px-4 py-3 text-sm">
        <span>⚠</span>
        <span th:text="${errorMessage}">Error</span>
    </div>

    <form method="post" action="/events/new" class="bg-slate-800/50 border border-slate-700/40 rounded-2xl p-6 space-y-5">

        <!-- Title -->
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Event Title <span class="text-red-400">*</span></label>
            <input type="text" name="title" required maxlength="255"
                   placeholder="e.g. Champions League Final"
                   class="w-full bg-slate-900 border border-slate-600 text-white placeholder-slate-500 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"/>
        </div>

        <!-- Date + Time -->
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Date <span class="text-red-400">*</span></label>
                <input type="date" name="eventDate" required
                       class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Time <span class="text-red-400">*</span></label>
                <input type="time" name="eventTime" required
                       class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition"/>
            </div>
        </div>

        <!-- Sport + Status -->
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Sport <span class="text-red-400">*</span></label>
                <select name="sportId" required
                        class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    <option value="">Select sport...</option>
                    <option th:each="sport : ${sports}" th:value="${sport.id}" th:text="${sport.name}">Sport</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Status</label>
                <select name="status"
                        class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}"
                            th:selected="${s.name() == 'SCHEDULED'}">Status</option>
                </select>
            </div>
        </div>

        <!-- Venue -->
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Venue <span class="text-red-400">*</span></label>
            <select name="venueId" required
                    class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <option value="">Select venue...</option>
                <option th:each="venue : ${venues}" th:value="${venue.id}" th:text="${venue.name}">Venue</option>
            </select>
        </div>

        <!-- Teams -->
        <div class="border-t border-slate-700/40 pt-5">
            <p class="text-sm font-semibold text-slate-300 mb-3">Teams <span class="text-slate-500 font-normal">(optional)</span></p>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-emerald-400 uppercase tracking-wider mb-1.5">Home Team</label>
                    <select name="homeTeamId"
                            class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition">
                        <option value="">None</option>
                        <option th:each="team : ${teams}" th:value="${team.id}"
                                th:text="${team.name + ' (' + team.sportName + ')'}">Team</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Away Team</label>
                    <select name="awayTeamId"
                            class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <option value="">None</option>
                        <option th:each="team : ${teams}" th:value="${team.id}"
                                th:text="${team.name + ' (' + team.sportName + ')'}">Team</option>
                    </select>
                </div>
            </div>
            <p class="text-xs text-slate-500 mt-2">You can also add teams later from the event detail page.</p>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
                Create Event
            </button>
            <a href="/events"
               class="flex-1 text-center bg-slate-700 hover:bg-slate-600 text-slate-300 font-semibold py-2.5 rounded-lg text-sm transition-colors">
                Cancel
            </a>
        </div>
    </form>

</main>
</body>
</html>
